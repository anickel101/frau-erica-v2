name: app CI

on:
  pull_request:
    paths:
      - "app/**"
  push:
    branches: [main]
    paths:
      - "app/**"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # lint, typecheck, format:check, test, build -- same as running
      # locally, see app/package.json's "ci" script.
      - run: npm run ci
